<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe Blocks</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050510;
            --board-bg: rgba(20, 20, 40, 0.7);
            --grid-line: rgba(0, 255, 255, 0.15);
            
            /* Colores de nave y asteroides por defecto */
            --ship-color: #ffd700;
            --ship-border: #d4af37;
            --ship-glow: rgba(255, 215, 0, 0.8);
            --asteroid-color: #5d6d7e;
            --asteroid-border: #7f8c8d;
            
            --accent: #00ffff;
            --cols: 6;
            --rows: 6;
            --exit-row: 2;
        }
        
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none; }
        #app { width: 100%; max-width: 500px; height: 100%; position: relative; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(5,5,16,0.1) 0%, rgba(5,5,16,0.7) 100%); transition: opacity 0.3s ease, transform 0.4s ease; }
        .active { display: flex; }
        
        .title-font { font-family: 'Orbitron', sans-serif; font-size: 42px; text-align: center; color: transparent; -webkit-text-stroke: 1px var(--accent); background: linear-gradient(to right, #00ffff, #ff00ff); -webkit-background-clip: text; text-shadow: 0 0 20px rgba(0,255,255,0.5); margin-bottom: 20px; line-height: 1.1; }
        
        button { background: rgba(0,0,0,0.4); border: 2px solid var(--accent); color: var(--accent); padding: 15px 30px; font-size: 20px; border-radius: 8px; margin: 10px; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-transform: uppercase; font-weight: bold; width: 80%; max-width: 300px; box-shadow: 0 0 10px rgba(0,255,255,0.2); font-family: 'Orbitron', sans-serif; backdrop-filter: blur(2px); -webkit-tap-highlight-color: transparent; outline: none; }
        button:focus { outline: none; }
        
        /* Clic instantáneo azul y hundimiento para cualquier botón (Eliminado scale() para solucionar error en móviles) */
        button:active { 
            background: var(--accent) !important; 
            color: var(--bg) !important; 
            transform: translateY(2px) !important; 
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.8) !important; 
            transition: none !important; 
        }
        
        button:disabled { border-color: #555; color: #555; box-shadow: none; background: rgba(0,0,0,0.6); }
        /* Protección para que los botones deshabilitados no se coloreen ni se hundan al clicarlos */
        button:disabled:active { background: rgba(0,0,0,0.6) !important; color: #555 !important; transform: none !important; box-shadow: none !important; }
        
        /* Imagen estática en diagonal inferior derecha */
        .floating-logo-block { 
            width: 75px; 
            height: 75px; 
            background: transparent; 
            border-radius: 8px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: absolute; 
            bottom: -45px; /* Más abajo para no tapar la S */
            right: -45px;  /* Más a la derecha */
            transform: rotate(-35deg); /* Un poco más de rotación */
            z-index: 10;
        }
        
        /* Ficha Dorada (Nave) con CSS puro */
        .css-golden-token {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFDF00 0%, #D4AF37 50%, #B8860B 100%);
            border: 2px solid #FFFACD;
            border-radius: 6px;
            box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.7), 0 0 10px rgba(255, 215, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        .css-golden-token::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: shineToken 3s infinite;
        }
        .css-golden-token-icon {
            font-size: 32px;
            z-index: 2;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        @keyframes shineToken {
            0% { transform: translateX(-100%) rotate(45deg); }
            20%, 100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Animación reservada para el astronauta */
        @keyframes floatBlock { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        
        .top-hud { position: absolute; top: 10px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; font-family: 'Orbitron', sans-serif; z-index: 50; pointer-events: none;}
        .coin-display { color: #f0e68c; text-shadow: 0 0 10px #f0e68c; font-size: 18px; display: flex; align-items: center; gap: 5px; }

        #splash-screen { background: rgba(0,0,0,0.8); font-family: 'Orbitron', sans-serif; font-size: 24px; text-transform: uppercase; letter-spacing: 3px; z-index: 100; text-align: center; backdrop-filter: blur(5px); }
        .creator-text { color: var(--accent); text-shadow: 0 0 15px var(--accent); animation: pulseText 2s infinite; }
        #loading-screen { z-index: 99; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);}
        .loading-bar-container { width: 60%; height: 10px; border: 2px solid var(--accent); border-radius: 5px; margin-top: 20px; overflow: hidden; }
        #load-bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.2s; }
        @keyframes pulseText { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Padding superior e inferior para evitar cortes en el sombreado de los universos */
        .carousel-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; width: 100%; max-width: 400px; padding-top: 40px; padding-bottom: 40px; margin-top: -20px; scrollbar-width: none; }
        .carousel-container::-webkit-scrollbar { display: none; }
        .universe-card { min-width: 100%; scroll-snap-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: scale(0.9); transition: transform 0.3s; }
        .universe-card.unlocked { cursor: pointer; }
        .universe-card.unlocked:active { transform: scale(0.85); }
        .universe-icon { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, rgba(0,255,255,0.5), rgba(0,0,51,0.5)); box-shadow: 0 0 30px var(--accent); display: flex; justify-content: center; align-items: center; font-size: 50px; margin-bottom: 20px; position: relative;}
        .universe-card.locked .universe-icon { background: radial-gradient(circle, rgba(51,51,51,0.5), rgba(17,17,17,0.5)); box-shadow: none; color: #555; }
        .universe-name { font-family: 'Orbitron', sans-serif; font-size: 22px; color: white; text-shadow: 0 0 10px #fff; }
        .swipe-hint { font-size: 12px; color: #aaa; margin-top: 10px; animation: pulse 1.5s infinite; }

        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; max-width: 400px; margin-bottom: 20px; max-height: 60vh; overflow-y: auto; touch-action: pan-y; padding-right: 5px; }
        .level-grid::-webkit-scrollbar { width: 6px; }
        .level-grid::-webkit-scrollbar-track { background: rgba(0, 255, 255, 0.1); border-radius: 4px; }
        .level-grid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        .grid-btn { padding: 20px 0; font-size: 15px; margin: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center;}
        
        #game-container { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 30px; }
        #header { display: flex; justify-content: space-between; width: 90%; margin-bottom: 15px; font-size: 16px; font-weight: bold; color: var(--accent); font-family: 'Orbitron', sans-serif; text-shadow: 0 0 5px #000;}
        
        #board-wrapper { position: relative; width: 90vw; max-width: 380px; aspect-ratio: var(--cols) / var(--rows); background: var(--board-bg); border: 4px solid var(--accent); box-shadow: 0 0 20px rgba(0,255,255,0.3), inset 0 0 20px rgba(0,255,255,0.2); border-radius: 8px; box-sizing: content-box; transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.3s, box-shadow 0.3s; backdrop-filter: blur(4px); }
        
        .destruction-mode { border-color: #ff4444 !important; box-shadow: 0 0 30px rgba(255, 68, 68, 0.6), inset 0 0 20px rgba(255, 68, 68, 0.4) !important; }
        .destruction-mode .asteroid .block-inner { border-color: #ff4444; background: rgba(255, 68, 68, 0.2); animation: pulseDanger 1s alternate infinite; }
        @keyframes pulseDanger { from { box-shadow: inset 0 0 5px #ff4444; } to { box-shadow: inset 0 0 20px #ff4444; } }

        .grid-lines { position: absolute; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(var(--cols), 1fr); grid-template-rows: repeat(var(--rows), 1fr); pointer-events: none; }
        .grid-cell { border: 1px solid var(--grid-line); }
        #blocks-container { position: absolute; width: 100%; height: 100%; border-radius: 4px; }
        
        .block { position: absolute; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-sizing: border-box; transition: transform 0.15s cubic-bezier(0.25, 0.8, 0.25, 1); touch-action: none; }
        .block.dragging { z-index: 10; transition: none; }
        .block-inner { width: 96%; height: 96%; border-radius: 6px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; transition: background 0.3s, border 0.3s; overflow: hidden; }
        
        /* Actualizada la clase ship para que ocupe completamente su espacio sin huecos */
        .ship { background: transparent; z-index: 5; padding: 0; } 
        .ship .block-inner { background: transparent; border: none; box-shadow: none; width: 100% !important; height: 100% !important; border-radius: 6px; }
        
        .asteroid { background: var(--asteroid-color); box-shadow: 0 0 8px rgba(0,0,0,0.8); }
        .asteroid .block-inner { background: var(--asteroid-border); border: 1px solid rgba(255,255,255,0.2); }
        
        .exit-hole { position: absolute; right: -24px; top: calc(100% / var(--rows) * var(--exit-row)); height: calc(100% / var(--rows)); width: 24px; background: rgba(0, 255, 255, 0.15); border: 4px solid var(--accent); border-left: none; box-shadow: inset 0 0 15px rgba(0,255,255,0.4), 10px 0 20px var(--accent); border-radius: 0 8px 8px 0; display: flex; align-items: center; justify-content: center; box-sizing: border-box; z-index: 10; backdrop-filter: blur(2px);}
        .exit-hole::before { content: ''; position: absolute; left: -4px; top: -4px; height: calc(100% + 8px); width: 4px; background: var(--board-bg); z-index: 20; }
        .exit-hole::after { content: '»'; color: var(--accent); font-weight: bold; animation: pulse 1s infinite alternate; z-index: 21; position: relative;}
        
        #controls { display: flex; justify-content: space-around; width: 90%; margin-top: 15px; gap: 5px; }
        .icon-btn { width: 50px; height: 50px; border-radius: 25px; padding: 0; display: flex; justify-content: center; align-items: center; font-size: 20px; background: rgba(0,255,255,0.1); margin:0;}
        .hint-btn { flex-grow: 1; margin: 0; display: flex; justify-content: center; align-items: center; gap: 5px; font-size: 14px; padding: 10px;}
        
        .shop-section { width: 90%; max-width: 400px; max-height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; touch-action: pan-y; padding-right: 5px;}
        .shop-section::-webkit-scrollbar { width: 6px; }
        .shop-section::-webkit-scrollbar-track { background: rgba(0, 255, 255, 0.1); border-radius: 4px; }
        .shop-section::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        
        /* ESTILOS FIJOS PARA LA TIENDA DE ITEMS COMUNES */
        .shop-item { background: rgba(0,255,255,0.1); border: 1px solid var(--accent); border-radius: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px);}
        .shop-item-info { display: flex; flex-direction: column; align-items: flex-start;}
        .shop-item-title { font-weight: bold; color: white; font-family: 'Orbitron'; font-size: 15px;}
        .shop-item-desc { font-size: 11px; color: #ccc; }
        .shop-btn { width: auto; padding: 8px 15px; font-size: 14px; margin: 0; }
        
        /* NUEVOS ESTILOS ANTI-DEFORMACIÓN PARA AVATARES Y SKINS */
        .shop-item-new {
            background: rgba(0,255,255,0.1); border: 1px solid var(--accent); border-radius: 10px; padding: 12px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between; gap: 10px; backdrop-filter: blur(5px);
        }
        .shop-item-left { display: flex; align-items: center; cursor: pointer; flex: 1; min-width: 0; }
        .shop-img-box {
            width: 55px; height: 55px; min-width: 55px; background: rgba(0,0,0,0.6); border-radius: 8px;
            display: flex; justify-content: center; align-items: center; border: 1px solid var(--accent); overflow: hidden; flex-shrink: 0;
        }
        .shop-item-title-new {
            margin-left: 10px; font-size: 12px; text-transform: uppercase; line-height: 1.2; flex: 1;
            word-wrap: break-word; color: white; font-family: 'Orbitron'; font-weight: bold;
        }
        .shop-item-right { width: 105px; min-width: 105px; flex-shrink: 0; display: flex; justify-content: flex-end; }
        .shop-btn-new {
            width: 100%; padding: 8px 0; font-size: 13px; margin: 0; background: rgba(0,0,0,0.4); border: 2px solid var(--accent);
            color: var(--accent); border-radius: 8px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-family: 'Orbitron';
            white-space: nowrap; 
        }

        .zoom-in { animation: animZoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .zoom-out { animation: animZoomOut 0.4s forwards; }
        @keyframes animZoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes animZoomOut { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulse { from { opacity: 0.3; transform: translateX(-3px); } to { opacity: 1; transform: translateX(3px); } }

        .hint-highlight { outline: 4px solid #ff00ff; outline-offset: 2px; animation: hintPulse 1s infinite; z-index: 20;}
        @keyframes hintPulse { 0% { outline-color: #ff00ff; } 50% { outline-color: transparent; } 100% { outline-color: #ff00ff; } }

        #stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* SISTEMA MODAL IN-GAME */
        #custom-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 200; display: none;
            justify-content: center; align-items: center; opacity: 0;
            transition: opacity 0.3s ease; backdrop-filter: blur(3px);
        }
        #custom-modal.show { opacity: 1; }
        .modal-content {
            background: rgba(10, 10, 30, 0.9); border: 2px solid var(--accent);
            border-radius: 15px; padding: 30px 20px; text-align: center;
            transform: scale(0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 40px rgba(0,255,255,0.3); width: 85%; max-width: 350px;
        }
        #custom-modal.show .modal-content { transform: scale(1); }
        .modal-title { font-family: 'Orbitron'; font-size: 24px; margin-bottom: 15px; text-transform: uppercase; text-shadow: 0 0 10px var(--accent); }
        .modal-stats { font-size: 16px; margin-bottom: 25px; line-height: 1.6; }
        .modal-stats b { color: #f0e68c; font-size: 18px; }
        .modal-btn-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .modal-btn-group button { width: 100%; margin: 0; font-size: 16px; padding: 12px; }

        /* MODAL DE ALERTAS TIENDA */
        #shop-alert-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 300; display: none;
            justify-content: center; align-items: center; opacity: 0;
            transition: opacity 0.3s ease; backdrop-filter: blur(3px);
        }
        #shop-alert-modal.show { opacity: 1; }
        #shop-alert-modal .modal-content {
            border-color: #ff4444; box-shadow: 0 0 40px rgba(255,68,68,0.3);
        }
        
        /* ESTILOS DEL TUTORIAL */
        #tutorial-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            backdrop-filter: blur(4px); cursor: pointer;
        }
        #astronaut-img {
            width: 140px; position: absolute; bottom: 30px; left: 20px;
            animation: floatBlock 3s ease-in-out infinite; pointer-events: none;
        }
        #speech-bubble {
            background: rgba(10, 10, 30, 0.95); border: 2px solid var(--accent);
            color: white; padding: 20px; border-radius: 15px;
            width: 70%; max-width: 280px; position: absolute; bottom: 180px; left: 30px;
            font-family: 'Segoe UI', sans-serif; font-size: 15px;
            box-shadow: 0 0 20px rgba(0,255,255,0.4); line-height: 1.5; pointer-events: none;
        }
        #speech-bubble::after {
            content: ''; position: absolute; bottom: -18px; left: 40px;
            border-width: 20px 20px 0; border-style: solid;
            border-color: var(--accent) transparent transparent transparent;
        }
        .tut-skip {
            position: absolute; top: 30px; right: 30px; color: #fff; font-size: 14px;
            animation: pulse 1.5s infinite; font-family: 'Orbitron'; pointer-events: none;
        }
    </style>
</head>
<body ontouchstart="">
    <canvas id="stars"></canvas>
    
    <div class="top-hud">
        <div class="coin-display" style="display:none;" id="hud-coins">🌙 <span id="coin-count">0</span></div>
    </div>

    <div id="app">
        <div id="splash-screen" class="screen active">
            <div class="creator-text">Creado por<br>Plácido Alcaraz</div>
        </div>

        <div id="loading-screen" class="screen">
            <h2 style="font-family: 'Orbitron'; color: var(--accent);">Inicializando Motores...</h2>
            <div class="loading-bar-container"><div id="load-bar"></div></div>
        </div>

        <div id="menu-screen" class="screen">
            <div style="position: relative; display: inline-block; margin-bottom: 30px; text-align: center;">
                <h1 class="title-font" style="margin-bottom: 0;">UNIVERSE<br>BLOCKS</h1>
                <!-- Imagen colocada en diagonal inferior derecha -->
                <div class="floating-logo-block" id="menu-logo"></div>
            </div>
            
            <button onclick="nav('universe')">Jugar</button>
            <button onclick="buildShop(); nav('shop')">Tienda</button>
            <button onclick="nav('options')">Opciones</button>
        </div>

        <div id="options-screen" class="screen">
            <h1 class="title-font" style="font-size: 30px;">Opciones</h1>
            <button id="sound-toggle" onclick="toggleSound()">Sonido: Activado</button>
            <button onclick="resetProgress()" style="border-color: #ff4444; color: #ff4444;">Borrar Progreso</button>
            <button onclick="nav('menu')">Volver</button>
        </div>

        <div id="universe-screen" class="screen">
            <h1 class="title-font" style="font-size: 26px;">Selecciona Universo</h1>
            <div class="carousel-container" id="universe-carousel"></div>
            <div class="swipe-hint">← Desliza para explorar →</div>
            <button onclick="nav('menu')" style="margin-top: 20px; width: 50%;">Volver</button>
        </div>

        <div id="galaxy-screen" class="screen">
            <h1 class="title-font" style="font-size: 26px;" id="gal-title">Galaxias</h1>
            <div class="level-grid" id="galaxy-grid"></div>
            <button onclick="nav('universe')" style="width: 50%;">Volver</button>
        </div>

        <div id="world-screen" class="screen">
            <h1 class="title-font" style="font-size: 26px;" id="world-title">Mundos</h1>
            <div class="level-grid" id="world-grid"></div>
            <button onclick="nav('galaxy')" style="width: 50%;">Volver</button>
        </div>

        <div id="shop-screen" class="screen">
            <h1 class="title-font" style="font-size: 30px;">Tienda Estelar</h1>
            <div class="shop-section" id="shop-list"></div>
            <button onclick="nav('menu')" style="width: 50%;">Volver</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="game-container">
                <div id="header">
                    <span id="level-display">M1</span>
                    <span id="moves-display">Mov: 0</span>
                </div>
                <div id="board-wrapper">
                    <div class="grid-lines" id="grid"></div>
                    <div class="exit-hole"></div>
                    <div id="blocks-container"></div>
                </div>
                <div id="controls">
                    <button class="icon-btn" onclick="nav('world')">🔙</button>
                    <button class="icon-btn" id="restart-btn" onclick="restartLevel()">🔄</button>
                    <button class="hint-btn" onclick="useHint()">💡 <span id="hint-count">0</span></button>
                    <button class="hint-btn" id="btn-destructor" onclick="toggleDestructor()" style="border-color: #ff4444; color: #ff4444;">💣 <span id="destructor-count">0</span></button>
                </div>
            </div>
        </div>

        <!-- MODAL DE VICTORIA -->
        <div id="custom-modal">
            <div class="modal-content">
                <div class="modal-title" id="modal-title">¡Completado!</div>
                <div class="modal-stats" id="modal-stats"></div>
                <div class="modal-btn-group">
                    <button id="modal-next-btn" onclick="nextLevelFromModal()">Siguiente Nivel</button>
                    <button style="background: transparent; border-color: #777; color: #aaa;" onclick="navFromModal('world')">Volver a Mundos</button>
                </div>
            </div>
        </div>

        <!-- NUEVO MODAL DE TIENDA (FONDOS INSUFICIENTES) -->
        <div id="shop-alert-modal">
            <div class="modal-content">
                <div class="modal-title" style="color: #ff4444; text-shadow: 0 0 10px #ff4444;">Sin Lunas</div>
                <div class="modal-stats" style="color: white;">No tienes suficientes Lunas Estelares para realizar esta compra.</div>
                <div class="modal-btn-group">
                    <button onclick="closeShopAlertAndPlay()" style="background: rgba(0,255,255,0.1); border-color: var(--accent); color: var(--accent);">JUGAR Y CONSEGUIR</button>
                    <button onclick="closeShopAlert()" style="background: transparent; border-color: #777; color: #aaa;">VOLVER A LA TIENDA</button>
                </div>
            </div>
        </div>

        function updateHUD() {
            document.getElementById('coin-count').innerText = playerData.coins;
            document.getElementById('hint-count').innerText = playerData.hints;
            if (document.getElementById('destructor-count')) {
                document.getElementById('destructor-count').innerText = playerData.destructors;

            if(document.getElementById('hud-coins').style.display !== 'flex' && !document.getElementById('splash-screen').classList.contains('active')) {
                document.getElementById('hud-coins').style.display = 'flex';

        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let actx;
        function playSound(type) {
            if(!playerData.sound) return;
            if(!actx) actx = new AudioContext();
            if(actx.state === 'suspended') actx.resume();

            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.connect(gain);
            gain.connect(actx.destination);
            const now = actx.currentTime;
            
            if (type === 'move') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'win') {
                osc.type = 'square';
                [440, 554, 659, 880].forEach((freq, i) => {
                    setTimeout(() => {
                        const o = actx.createOscillator(); const g = actx.createGain();
                        o.type = 'triangle'; o.connect(g); g.connect(actx.destination);
                        o.frequency.value = freq; g.gain.setValueAtTime(0.1, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3);
                        o.start(); o.stop(actx.currentTime + 0.3);
                    }, i * 100);
                });
            } else if (type === 'buy') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.setValueAtTime(900, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'destroy') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        function nav(screenId, directionClass = 'zoom-in') {

            if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
                document.activeElement.blur();

            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active', 'zoom-in', 'zoom-out');
            });
            
            const target = document.getElementById(screenId + '-screen');
            target.classList.add('active', directionClass);
            updateHUD();

            if (screenId === 'universe') buildUniverseSelect();
            if (screenId === 'galaxy') buildGalaxySelect();
            if (screenId === 'world') buildWorldSelect();
            if (screenId === 'game') {
                destructionMode = false;
                document.getElementById('board-wrapper').classList.remove('destruction-mode');

            if(screenId === 'splash' || screenId === 'loading' || screenId === 'menu') {

        function buildUniverseSelect() {
            const container = document.getElementById('universe-carousel');

            UNIVERSES.forEach((u, i) => {
                const isUnlocked = i <= playerData.maxU;

                card.innerHTML = `

        function buildGalaxySelect() {

            for(let i=0; i<totalG; i++) {
                const isUnlocked = currentU < playerData.maxU || (currentU === playerData.maxU && i <= playerData.maxG);
                const btn = document.createElement('button');
                btn.className = 'grid-btn';
                const galaxyName = GALAXY_NAMES[currentU][i];

                    btn.onclick = () => { currentG = i; nav('world', 'zoom-in'); };

                grid.appendChild(btn);
            }

        function generateShopItemHtml(item, type) {
            const isOwned = type === 'avatar' ? playerData.ownedAvatars.includes(item.id) : playerData.ownedSkins.includes(item.id);
            const isEquipped = type === 'avatar' ? playerData.equippedAvatar === item.id : playerData.equippedSkin === item.id;
            
            let btnHtml = '';
            if (isEquipped) {
                btnHtml = `<button class="shop-btn-new" disabled style="border-color:#0f0; color:#0f0;">EN USO</button>`;
            } else if (isOwned) {
                btnHtml = `<button class="shop-btn-new" onclick="equipItem('${type}', '${item.id}')">EQUIPAR</button>`;
            } else {
                let costText = item.cost > 0 ? `${item.cost} 🌙` : `GRATIS`;
                btnHtml = `<button class="shop-btn-new" onclick="buyItem('${type}', ${item.cost}, '${item.id}')">${costText}</button>`;
            }

            return `
                <div class="shop-item-new">
                    <div class="shop-item-left" onclick="showImageModal('${item.img}')">
                        <div class="shop-img-box">
                            <img src="${item.img}" alt="${item.name}" style="max-width: 90%; max-height: 90%; object-fit: contain;">

                        <span class="shop-item-title-new">${item.name}</span>

                    <div class="shop-item-right">

                    </div>
                </div>
            `;
        }

            if(playerData.coins >= cost) {

        function equipItem(type, id) {
            if (type === 'avatar') playerData.equippedAvatar = id;
            if (type === 'skin') playerData.equippedSkin = id;
            saveData();
            applyAvatar(); 
            buildShop();
        }

        function applyAvatar() {
            const logo = document.getElementById('menu-logo');
            // Reemplazada imagen por la nueva ficha CSS dorada animada
            logo.innerHTML = `<div class="css-golden-token" style="border-radius: 8px;"><span class="css-golden-token-icon" style="font-size: 40px;">🚀</span></div>`;
            if (blocksContainer.innerHTML !== '') {
                renderBlocks();
            }
        }

        function cloneState(st) { return st.map(b => ({...b})); }
        function hashState(st) { return st.map(b => `${b.id}:${b.x},${b.y}`).join('|'); }

        function isOverlappingState(b1, b2) {
            return !(b1.x + b1.w <= b2.x || b1.x >= b2.x + b2.w || b1.y + b1.h <= b2.y || b1.y >= b2.y + b2.h);
        }

        function getValidMoves(state) {
            let moves = [];
            for (let i = 0; i < state.length; i++) {
                let b = state[i];
                const isHoriz = b.w > b.h;
                
                let minB = 0, maxB = isHoriz ? COLS - b.w : ROWS - b.h;
                for (let j = 0; j < state.length; j++) {
                    if (i === j) continue;
                    let o = state[j];
                    if (isHoriz) {
                        if (b.y < o.y + o.h && b.y + b.h > o.y) {
                            if (o.x < b.x) minB = Math.max(minB, o.x + o.w);
                            else maxB = Math.min(maxB, o.x - b.w);
                        }
                    } else {
                        if (b.x < o.x + o.w && b.x + b.w > o.x) {
                            if (o.y < b.y) minB = Math.max(minB, o.y + o.h);
                            else maxB = Math.min(maxB, o.y - b.h);
                        }
                    }
                }
                
                let currentVal = isHoriz ? b.x : b.y;
                for(let v = minB; v <= maxB; v++) {
                    if(v !== currentVal) moves.push({ id: b.id, target: v, isHoriz });
                }
            }
            return moves;
        }

        function applyMove(state, move) {
            let ns = cloneState(state);
            let b = ns.find(x => x.id === move.id);
            if(move.isHoriz) b.x = move.target; else b.y = move.target;
            return ns;
        }

        function solveBFS(initialState, maxDepth = 15000) {
            let queue = [{ state: cloneState(initialState), path: [] }];
            let visited = new Set();
            visited.add(hashState(initialState));
            let iter = 0;

            while (queue.length > 0 && iter < maxDepth) {
                let curr = queue.shift();
                let ship = curr.state.find(b => b.isShip);
                if (!ship) break;
                
                if (ship.x === COLS - ship.w) return curr.path;

                let moves = getValidMoves(curr.state);
                for (let m of moves) {
                    let nextSt = applyMove(curr.state, m);
                    let h = hashState(nextSt);
                    if (!visited.has(h)) {
                        visited.add(h);
                        queue.push({ state: nextSt, path: [...curr.path, m] });
                    }
                }
                iter++;
                if (queue.length > 40000) break;
            }
            return null;
        }

        const PREDEFINED_WORLDS = {
            "0_0_0": [
                { id: 0, x: 0, y: 2, w: 2, h: 1, isShip: true },
                { id: 1, x: 1, y: 0, w: 1, h: 2 },
                { id: 2, x: 2, y: 2, w: 1, h: 2 },
                { id: 3, x: 4, y: 1, w: 1, h: 2 },
                { id: 4, x: 0, y: 4, w: 1, h: 2 },
                { id: 5, x: 3, y: 4, w: 3, h: 1 }
            ],
            "0_0_1": [
                { id: 0, x: 0, y: 2, w: 2, h: 1, isShip: true }, 
                { id: 1, x: 0, y: 0, w: 3, h: 1 },               
                { id: 2, x: 1, y: 4, w: 2, h: 1 },               
                { id: 3, x: 3, y: 2, w: 1, h: 3 },               
                { id: 4, x: 5, y: 1, w: 1, h: 2 },               
                { id: 5, x: 4, y: 5, w: 2, h: 1 }                
            ],
            "0_0_2": [
                { id: 0, x: 0, y: 2, w: 2, h: 1, isShip: true }, 
                { id: 1, x: 0, y: 0, w: 2, h: 1 },               
                { id: 2, x: 1, y: 3, w: 1, h: 2 },               
                { id: 3, x: 3, y: 0, w: 1, h: 2 },               
                { id: 4, x: 3, y: 4, w: 2, h: 1 },               
                { id: 5, x: 3, y: 5, w: 3, h: 1 },
                { id: 6, x: 5, y: 2, w: 1, h: 3 }                
            ],
            "0_0_3": [
                { id: 0, x: 0, y: 2, w: 2, h: 1, isShip: true }, 
                { id: 1, x: 0, y: 4, w: 3, h: 1 },               
                { id: 2, x: 2, y: 0, w: 1, h: 2 },               
                { id: 3, x: 3, y: 1, w: 1, h: 2 },               
                { id: 4, x: 3, y: 4, w: 1, h: 2 },               
                { id: 5, x: 4, y: 2, w: 1, h: 3 },
                { id: 6, x: 5, y: 0, w: 1, h: 2 }                
            ]
        };

        function generateWorld(u, g, w) {
            const key = `${u}_${g}_${w}`;
            let levelBlocks;
            
            if (PREDEFINED_WORLDS[key]) {
                levelBlocks = cloneState(PREDEFINED_WORLDS[key]);
            } else {
                levelBlocks = [
                    { id: 0, x: 0, y: 2, w: 2, h: 1, isShip: true },
                    { id: 1, x: 3, y: 1, w: 1, h: 3 }
                ];
            }

            const solution = solveBFS(levelBlocks, 15000);
            currentLevelMinMoves = solution ? solution.length : 15;
            currentLevelInitialState = cloneState(levelBlocks);
            
            return levelBlocks;
        }

        const boardWrapper = document.getElementById('board-wrapper');
        const blocksContainer = document.getElementById('blocks-container');
        const gridEl = document.getElementById('grid');
        
        gridEl.innerHTML = ''; 
        for(let i=0; i < COLS * ROWS; i++) {
            const cell = document.createElement('div'); cell.className = 'grid-cell'; gridEl.appendChild(cell);
        }

        let blocks = [];
        let isDragging = false;
        let activeBlock = null;
        let startPos = {x: 0, y: 0}, startCoords = {x: 0, y: 0};
        let cellW = 0, cellH = 0, minDragBound = 0, maxDragBound = 0;
        let movesCount = 0;

        function renderBlocks() {
            blocksContainer.innerHTML = '';
            document.querySelectorAll('.hint-highlight').forEach(el => el.classList.remove('hint-highlight'));
            
            blocks.forEach(b => {
                const el = document.createElement('div');
                el.className = `block ${b.isShip ? 'ship' : 'asteroid'}`;
                el.id = 'block-' + b.id;
                el.style.width = (b.w * 100 / COLS) + '%';
                el.style.height = (b.h * 100 / ROWS) + '%';
                
                const inner = document.createElement('div');
                inner.className = 'block-inner';
                
                if(b.isShip) {
                    // Creada la nueva ficha dorada sin depender de una imagen externa
                    const token = document.createElement('div');
                    token.className = 'css-golden-token';
                    token.innerHTML = `<span class="css-golden-token-icon">🚀</span>`;
                    inner.appendChild(token);
                } else {
                    if (playerData.equippedSkin && playerData.equippedSkin !== 'default_skin') {
                        const currentSkin = SKINS.find(s => s.id === playerData.equippedSkin);
                        if (currentSkin) {
                            const img = document.createElement('img');
                            img.src = currentSkin.img;
                            img.style.width = '100%';
                            img.style.height = '100%';
                            img.style.objectFit = 'cover';
                            img.style.borderRadius = '4px';
                            inner.appendChild(img);
                            
                            inner.style.background = 'transparent';
                            inner.style.border = 'none';
                        }
                    }
                }
                
                el.appendChild(inner);

                updateBlockDOM(el, b);
                blocksContainer.appendChild(el);

                el.addEventListener('pointerdown', (e) => startDrag(e, b, el));
            });
        }

        function loadWorld(u, g, w) {
            blocksContainer.style.overflow = 'hidden';
            blocks = cloneState(generateWorld(u, g, w));
            movesCount = 0;
            destructionMode = false;
            document.getElementById('board-wrapper').classList.remove('destruction-mode');
            document.getElementById('moves-display').innerText = `Mov: ${movesCount}`;
            document.getElementById('level-display').innerText = `M${getGlobalWorldNumber(u, g, w)}`;
            renderBlocks();
        }

        function restartLevel() {
            if (movesCount === 0 && !destructionMode) return; 
            blocks = cloneState(currentLevelInitialState);
            movesCount = 0;
            destructionMode = false;
            document.getElementById('board-wrapper').classList.remove('destruction-mode');
            document.getElementById('moves-display').innerText = `Mov: 0`;
            renderBlocks();
            playSound('move');
        }

        function updateBlockDOM(el, b) { el.style.transform = `translate(${b.x * 100 / b.w}%, ${b.y * 100 / b.h}%)`; }

        function startDrag(e, blockData, el) {
            if(isDragging) return;
            
            if (destructionMode) {
                if (!blockData.isShip) {
                    blocks = blocks.filter(b => b.id !== blockData.id);
                    playerData.destructors--;
                    saveData();
                    destructionMode = false;
                    document.getElementById('board-wrapper').classList.remove('destruction-mode');
                    renderBlocks();
                    playSound('destroy');
                } else {
                    el.style.transform = `translate(${blockData.x * 100 / blockData.w}%, ${blockData.y * 100 / blockData.h}%) scale(0.9)`;
                    setTimeout(() => updateBlockDOM(el, blockData), 150);
                }
                return;
            }

            isDragging = true;
            activeBlock = { data: blockData, el: el };
            el.classList.add('dragging');
            el.classList.remove('hint-highlight'); 
            
            cellW = boardWrapper.clientWidth / COLS;
            cellH = boardWrapper.clientHeight / ROWS;
            
            startPos = { x: e.clientX, y: e.clientY };
            startCoords = { x: blockData.x, y: blockData.y };
            
            let allMoves = getValidMoves(blocks);
            let myMoves = allMoves.filter(m => m.id === blockData.id);
            let isHoriz = blockData.w > blockData.h;
            
            minDragBound = blockData.x; maxDragBound = blockData.x;
            if(!isHoriz) { minDragBound = blockData.y; maxDragBound = blockData.y; }
            
            myMoves.forEach(m => {
                minDragBound = Math.min(minDragBound, m.target);
                maxDragBound = Math.max(maxDragBound, m.target);
            });
            
            document.addEventListener('pointermove', onDrag);
            document.addEventListener('pointerup', endDrag);
            el.setPointerCapture(e.pointerId);
        }

        function onDrag(e) {
            if(!isDragging || !activeBlock) return;
            e.preventDefault();
            const bd = activeBlock.data;
            const isHoriz = bd.w > bd.h;

            if (isHoriz) {
                let targetX = startCoords.x + ((e.clientX - startPos.x) / cellW);
                bd.x = Math.max(minDragBound, Math.min(targetX, maxDragBound));
            } else {
                let targetY = startCoords.y + ((e.clientY - startPos.y) / cellH);
                bd.y = Math.max(minDragBound, Math.min(targetY, maxDragBound));
            }
            updateBlockDOM(activeBlock.el, bd);
        }

        function endDrag(e) {
            if(!isDragging) return;
            const bd = activeBlock.data;
            bd.x = Math.round(bd.x); bd.y = Math.round(bd.y);
            updateBlockDOM(activeBlock.el, bd);
            
            activeBlock.el.classList.remove('dragging');
            
            if (bd.x !== startCoords.x || bd.y !== startCoords.y) {
                movesCount++;
                document.getElementById('moves-display').innerText = `Mov: ${movesCount}`;
                playSound('move');
                document.querySelectorAll('.hint-highlight').forEach(el => el.classList.remove('hint-highlight')); 
            }

            document.removeEventListener('pointermove', onDrag);
            document.removeEventListener('pointerup', endDrag);
            isDragging = false;
            
            if (bd.isShip && bd.x === COLS - bd.w) {
                blocksContainer.style.overflow = 'visible';
                setTimeout(winWorld, 200);
            }
            activeBlock = null;
        }

        function winWorld() {
            playSound('win');
            
            let maxCoins = 20 + (currentU * 15) + (currentG * 5);
            let extraMoves = Math.max(0, movesCount - currentLevelMinMoves);
            let penalization = extraMoves * 3; 
            let coinsEarned = Math.max(0, maxCoins - penalization);
            
            if (coinsEarned > 0) playerData.coins += coinsEarned;
            
            if (currentU === playerData.maxU && currentG === playerData.maxG && currentW === playerData.maxW) {
                playerData.maxW++;
                if(playerData.maxW >= WORLDS_PER_GALAXY[currentU]) {
                    playerData.maxW = 0; playerData.maxG++;
                    if(playerData.maxG >= GALAXIES_PER_UNIVERSE[currentU]) {
                        playerData.maxG = 0; playerData.maxU++;
                    }
                }
            }
            saveData();

            const shipEl = document.querySelector('.ship');
            if (shipEl) {
                shipEl.style.transition = 'transform 0.6s cubic-bezier(0.55, 0.085, 0.68, 0.53)';
                shipEl.style.transform = `translate(800%, ${blocks.find(b=>b.isShip).y * 100}%)`;
            }

            setTimeout(() => {
                showWinModal(movesCount, currentLevelMinMoves, coinsEarned, extraMoves === 0);
            }, 600);
        }

        function showWinModal(moves, optimal, lunas, isPerfect) {
            const modal = document.getElementById('custom-modal');
            const title = document.getElementById('modal-title');
            const stats = document.getElementById('modal-stats');
            
            title.innerText = isPerfect ? '¡PERFECTO!' : '¡MUNDO SUPERADO!';
            title.style.color = isPerfect ? '#ffd700' : 'var(--accent)';
            
            let lunaText = lunas > 0 ? `<b style="color:#00ffff">+${lunas} 🌙 Lunas</b>` : `<b style="color:#ff4444">0 🌙</b> (Demasiados pasos)`;
            
            stats.innerHTML = `
                Movimientos: <b>${moves}</b><br>
                Ruta Óptima: <b style="color:#aaa">${optimal}</b><br><br>
                Recompensa: ${lunaText}
            `;
            
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function nextLevelFromModal() {
            const modal = document.getElementById('custom-modal');
            modal.classList.remove('show');
            
            setTimeout(() => {
                modal.style.display = 'none';
                
                boardWrapper.style.opacity = 0;
                boardWrapper.style.transform = 'scale(0.9)';
                
                setTimeout(() => {
                    currentW++;
                    if(currentW >= WORLDS_PER_GALAXY[currentU]) { currentW = 0; currentG++; }
                    if(currentG >= GALAXIES_PER_UNIVERSE[currentU]) { currentG = 0; currentU++; }
                    
                    if(currentU >= UNIVERSES.length) {
                        nav('menu'); 
                    } else {
                        loadWorld(currentU, currentG, currentW);
                        boardWrapper.style.opacity = 1;
                        boardWrapper.style.transform = 'scale(1)';
                    }
                }, 400); 
            }, 300); 
        }

        function navFromModal(screen) {
            const modal = document.getElementById('custom-modal');
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
                nav(screen);
            }, 300);
        }

        function useHint() {
            if(playerData.hints <= 0) {
                let btn = document.querySelector('.hint-btn');
                btn.style.transform = 'translateX(-5px)';
                setTimeout(()=> btn.style.transform = 'translateX(5px)', 50);
                setTimeout(()=> btn.style.transform = 'translateX(0)', 100);
                return;
            }
            
            document.querySelectorAll('.hint-highlight').forEach(el => el.classList.remove('hint-highlight'));
            
            let solution = solveBFS(blocks, 15000);
            if(solution && solution.length > 0) {
                playerData.hints--;
                saveData();
                let nextMove = solution[0];
                let el = document.getElementById('block-' + nextMove.id);
                el.classList.add('hint-highlight');
                
                let b = blocks.find(x=>x.id===nextMove.id);
                let dir = nextMove.isHoriz ? (nextMove.target > b.x ? 1 : -1) : (nextMove.target > b.y ? 1 : -1);
                
                el.style.transition = "transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                if(nextMove.isHoriz) el.style.transform = `translate(${b.x * 100 / b.w + (dir*15)}%, ${b.y * 100 / b.h}%)`;
                else el.style.transform = `translate(${b.x * 100 / b.w}%, ${b.y * 100 / b.h + (dir*15)}%)`;
                
                setTimeout(() => {
                    updateBlockDOM(el, b); 
                    setTimeout(() => el.style.transition = "transform 0.15s cubic-bezier(0.25, 0.8, 0.25, 1)", 200);
                }, 300);
            }
        }

        function toggleDestructor() {
            if (playerData.destructors <= 0) {
                let btn = document.getElementById('btn-destructor');
                btn.style.transform = 'translateX(-5px)';
                setTimeout(()=> btn.style.transform = 'translateX(5px)', 50);
                setTimeout(()=> btn.style.transform = 'translateX(0)', 100);
                return;
            }
            
            destructionMode = !destructionMode;
            const bw = document.getElementById('board-wrapper');
            if (destructionMode) {
                bw.classList.add('destruction-mode');
            } else {
                bw.classList.remove('destruction-mode');
            }
        }

        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let cw, ch;
        const starsArr = [];
        const bigEntities = [];

        function resize() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        for(let i=0; i<150; i++) {
            starsArr.push({ x: Math.random() * cw, y: Math.random() * ch, r: Math.random() * 1.5, vx: -(Math.random() * 0.5 + 0.1) });
        }

        function animateStars() {
            ctx.clearRect(0, 0, cw, ch);
            ctx.fillStyle = 'white';
            starsArr.forEach(s => {
                s.x += s.vx;
                if(s.x < 0) { s.x = cw; s.y = Math.random() * ch; }
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            });

            if(Math.random() < 0.005 && bigEntities.length < 3) {
                bigEntities.push({
                    x: cw + 50, y: Math.random() * ch, 
                    s: Math.random() * 30 + 10, 
                    vx: -(Math.random() * 1 + 0.5), 
                    color: `hsl(${Math.random()*360}, 50%, 50%)`,
                    type: Math.random() > 0.5 ? 'planet' : 'asteroid'
                });
            }

            for(let i=bigEntities.length-1; i>=0; i--) {
                let e = bigEntities[i];
                e.x += e.vx;
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.s, 0, Math.PI*2);
                ctx.fill();
                if(e.type === 'planet') {
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(e.x, e.y, e.s*1.5, e.s*0.4, 0.2, 0, Math.PI*2);
                    ctx.stroke();
                }
                if(e.x < -100) bigEntities.splice(i, 1);
            }

            requestAnimationFrame(animateStars);
        }
        animateStars();
    </script>
</body>
